name: Dispatch rebottle
run-name: Rebuild bottles of ${{ inputs.formula }}
on:
  workflow_dispatch:
    inputs:
      formula:
        description: Formula name
        required: true
      timeout:
        description: "Build timeout (in minutes, default: 180 minutes)"
        default: "180"
        required: false
      issue:
        description: Issue number, where comment on failure would be posted
        required: false
      upload:
        description: "Upload built bottles? (default: false)"
        type: boolean
        default: false
        required: false
      fail-fast:
        description: "Fail immediately on a single OS version failure? (default: true)"
        type: boolean
        default: true
        required: false
env:
  HOMEBREW_DEVELOPER: 1
  HOMEBREW_GITHUB_ACTIONS: 1
  HOMEBREW_NO_AUTO_UPDATE: 1
  HOMEBREW_NO_INSTALL_FROM_API: 1
  HOMEBREW_RELOCATE_RPATHS: 1
  HOMEBREW_ARM64_TESTING: 1
  DISPATCH_REBOTTLE_SENDER: ${{ github.event.sender.login }}
  DISPATCH_REBOTTLE_FORMULA: ${{ inputs.formula }}
  DISPATCH_REBOTTLE_TIMEOUT: ${{ inputs.timeout }}
  DISPATCH_REBOTTLE_ISSUE: ${{ inputs.issue }}
  DISPATCH_REBOTTLE_UPLOAD: ${{ inputs.upload }}

permissions:
  contents: read

jobs:
  bottle:
    strategy:
      matrix:
        include:
          - runner: 'macos-26'
          - runner: 'macos-15'
          - runner: 'macos-14'
          - runner: 'macos-14-x86_64'
          - runner: 'ubuntu-22.04'
            container:
              image:   "ghcr.io/homebrew/brew:main"
              options: "--user=linuxbrew -e GITHUB_ACTIONS_HOMEBREW_SELF_HOSTED"
            workdir: /github/home
          - runner: 'ubuntu-22.04-arm'
            container:
              image:   "ghcr.io/homebrew/brew:main"
              options: "--user=linuxbrew -e GITHUB_ACTIONS_HOMEBREW_SELF_HOSTED"
            workdir: /github/home
      fail-fast: ${{fromJson(github.event.inputs.fail-fast)}}
    runs-on: ${{matrix.runner}}
    container: ${{matrix.container}}
    timeout-minutes: ${{fromJson(github.event.inputs.timeout)}}
    defaults:
      run:
        working-directory: ${{matrix.workdir || github.workspace}}
    env:
      GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      BOTTLES_DIR: ${{ matrix.workdir || github.workspace }}/bottles
    steps:
      - name: ${{github.event.inputs.formula}}
        id: print_details
        run: |
          echo "sender=${DISPATCH_REBOTTLE_SENDER}"
          echo "formula=${DISPATCH_REBOTTLE_FORMULA}"
          echo "timeout=${DISPATCH_REBOTTLE_TIMEOUT}"
          echo "issue=${DISPATCH_REBOTTLE_ISSUE}"
          echo "upload=${DISPATCH_REBOTTLE_UPLOAD}"

      - name: Pre-test steps
        uses: Homebrew/actions/pre-build@main
        with:
          bottles-directory: ${{ env.BOTTLES_DIR }}

      - name: Run brew test-bot --only-formulae --only-json-tab --skip-online-checks --skip-dependents
        working-directory: ${{ env.BOTTLES_DIR }}
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          brew test-bot --only-formulae --only-json-tab --skip-online-checks --skip-dependents --root-url="https://ghcr.io/v2/${GITHUB_REPOSITORY_OWNER}/extensions" "${DISPATCH_REBOTTLE_FORMULA}"

      - name: Post-build steps
        if: always()
        uses: Homebrew/actions/post-build@main
        with:
          runner: ${{ matrix.runner }}
          bottles-directory: ${{ env.BOTTLES_DIR }}
          logs-directory: ${{ env.BOTTLES_DIR }}/logs

  upload:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-22.04
    needs: bottle
    if: inputs.upload
    container:
      image: ghcr.io/homebrew/brew:main
    defaults:
      run:
        shell: bash
    env:
      HOMEBREW_SIMULATE_MACOS_ON_LINUX: 1
      BOTTLES_DIR: ${{ github.workspace }}/bottles
    steps:
      - name: ${{github.event.inputs.formula}}
        id: print_details
        run: |
          echo "sender=${DISPATCH_REBOTTLE_SENDER}"
          echo "formula=${DISPATCH_REBOTTLE_FORMULA}"
          echo "issue=${DISPATCH_REBOTTLE_ISSUE}"
          echo "upload=${DISPATCH_REBOTTLE_UPLOAD}"

      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          core: true
          cask: false

      - name: Download bottles from GitHub Actions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: bottles_*
          path: ${{ env.BOTTLES_DIR }}
          merge-multiple: true

      - name: Configure Git user
        id: git-user-config
        uses: Homebrew/actions/git-user-config@main
        with:
          username: BrewTestBot

      - name: Upload bottles to GitHub Packages
        env:
          HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.repository_owner }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{secrets.HOMEBREW_GITHUB_API_TOKEN}}
        working-directory: ${{ env.BOTTLES_DIR }}
        run: |
          brew pr-upload --verbose --root-url="https://ghcr.io/v2/${{ github.repository_owner }}/extensions"

      - name: Push commits
        uses: Homebrew/actions/git-try-push@main
        with:
          directory: ${{steps.set-up-homebrew.outputs.repository-path}}
          token: ${{secrets.GITHUB_TOKEN}}

      - name: Sync branches
        run: gh workflow run sync-default-branches.yml -R ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
